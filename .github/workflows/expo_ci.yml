name: Expo CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  check-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest

      - name: Check Project
        run: npx expo-doctor || true

      - name: Check JavaScript Syntax
        run: npx expo start --offline --non-interactive
        timeout-minutes: 1
        continue-on-error: true